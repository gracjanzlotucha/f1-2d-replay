<!-- ═══ MAIN APP ════════════════════════════════════════════════════════════ -->
<div id="app" class="hidden">

  <!-- HEADER -->

            <div class="gp-dropdown-title">2025 SEASON</div>

            <button class="gp-dropdown-item" data-gp="belgian">Belgian Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="hungarian">Hungarian Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="dutch">Dutch Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="italian">Italian Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="azerbaijan">Azerbaijan Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="singapore">Singapore Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="united-states">United States Grand Prix</button>

            <button class="gp-dropdown-item" data-gp="sao-paulo">S&#227;o Paulo Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="las-vegas">Las Vegas Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="qatar">Qatar Grand Prix</button>
            <button class="gp-dropdown-item" data-gp="abu-dhabi">Abu Dhabi Grand Prix</button>
          </div>
        </div>
        <div class="header-buttons">
          <button class="hdr-btn" id="btn-share">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M12.3563 3.64365C11.0537 2.34101 8.94167 2.34101 7.63907 3.64365L7.63593 3.64675L7.13493 4.14116C6.87293 4.39979 6.45081 4.39702 6.19217 4.13496C5.93354 3.87291 5.93631 3.45081 6.19837 3.19217L6.69787 2.69923C8.52133 0.877493 11.4763 0.878033 13.2991 2.70085C15.122 4.52367 15.1225 7.47873 13.3007 9.3022L13.2991 9.3038L12.8078 9.8016C12.5492 10.0637 12.1271 10.0665 11.8651 9.8078C11.603 9.5492 11.6002 9.12707 11.8589 8.86507L12.3563 8.36093C13.659 7.05833 13.659 4.94631 12.3563 3.64365ZM4.13496 6.19217C4.39702 6.45081 4.39979 6.87293 4.14116 7.13493L3.64366 7.63907C2.34101 8.94167 2.34101 11.0537 3.64365 12.3563C4.94631 13.659 7.05833 13.659 8.36093 12.3563L8.36407 12.3533L8.86507 11.8589C9.12707 11.6002 9.5492 11.603 9.8078 11.8651C10.0665 12.1271 10.0637 12.5492 9.8016 12.8078L9.3038 13.2991L9.30213 13.3007C7.47867 15.1225 4.52366 15.1219 2.70085 13.2991C0.878033 11.4763 0.877493 8.52133 2.69924 6.6978L3.19217 6.19837C3.45081 5.93631 3.87291 5.93354 4.13496 6.19217ZM9.80473 6.19526C10.0651 6.45561 10.0651 6.87773 9.80473 7.13807L7.13807 9.80473C6.87773 10.0651 6.45561 10.0651 6.19526 9.80473C5.93491 9.5444 5.93491 9.12227 6.19526 8.86193L8.86193 6.19526C9.12227 5.93491 9.5444 5.93491 9.80473 6.19526Z" fill="#EAECF0"/>

            <span>Share</span>
          </button>
        </div>
      </div>
    </div>
    <!-- Hidden elements for JS compatibility -->
    <div class="hidden">
      <span id="hdr-lap-cur">—</span>
      <span id="hdr-lap-total">—</span>
      <div id="hdr-status-badge" class="status-badge status-green">RACE</div>
      <span id="weather-air">— °C</span>
      <span id="weather-track">— °C Track</span>
      <span id="hdr-race-time">0:00:00</span>
      <div id="weather-box"></div>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="main-grid">

    <!-- LEFT: STANDINGS -->
    <aside class="standings-panel">
      <div class="panel-header">
        <span class="panel-title">Standings</span>
        <span class="panel-subtitle" id="standings-lap-label"><span id="standings-lap-cur">—</span> <span class="panel-subtitle-dim">/ <span id="standings-lap-total">—</span></span></span>
      </div>
      <div class="standings-list" id="standings-list">
        <!-- populated by JS -->
      </div>
    </aside>

    <!-- MOBILE PANEL TABS (hidden on desktop via CSS) -->
    <div class="mobile-tab-bar">
      <div class="seg-control mobile-seg">
        <div class="seg-indicator"></div>
        <button class="seg-tab active" data-panel="standings">Standings</button>
        <button class="seg-tab" data-panel="insights">Insights</button>
        <button class="seg-tab" data-panel="events">Events</button>
        <button class="seg-tab" data-panel="track">Track</button>
      </div>
    </div>

    <!-- CENTER: TRACK CANVAS -->
    <section class="track-section">
      <div class="track-container" id="track-container">
        <canvas id="track-canvas"></canvas>
        <!-- Telemetry panel (follow mode) -->
        <div id="telemetry-panel" class="telemetry-panel hidden">
          <div class="tel-header" id="tel-header">
            <div class="tel-driver-info">
              <img class="tel-team-logo" id="tel-team-logo" src="" alt="" />
              <span class="tel-driver-name" id="tel-driver-name"></span>
            </div>
            <div class="tel-photo-wrap">
              <img class="tel-driver-photo" id="tel-driver-photo" src="" alt="" />
            </div>
          </div>
          <div class="tel-stats">
            <div class="tel-stat">
              <div class="tel-indicator"><div class="tel-indicator-fill" id="tel-speed-fill"></div></div>
              <span class="tel-label">KMH</span>
              <span class="tel-value" id="tel-speed">0</span>
            </div>
            <div class="tel-stat">
              <div class="tel-indicator"><div class="tel-indicator-fill" id="tel-rpm-fill"></div></div>
              <span class="tel-label">RPM</span>
              <span class="tel-value" id="tel-rpm">0</span>
            </div>
            <div class="tel-stat">
              <div class="tel-indicator"><div class="tel-indicator-fill" id="tel-brake-fill"></div></div>
              <span class="tel-label">Brake</span>
              <span class="tel-value" id="tel-brake">0%</span>
            </div>
            <div class="tel-stat tel-stat-drs">
              <span class="tel-value tel-drs-value" id="tel-drs">DRS</span>
            </div>
          </div>
        </div>
        <!-- Speed tooltip -->
        <div id="car-tooltip" class="car-tooltip hidden">
          <div class="tooltip-driver"></div>
          <div class="tooltip-team"></div>
          <div class="tooltip-pos"></div>
        </div>
      </div>

    </section>

    <!-- RIGHT: INSIGHTS / EVENTS -->
    <aside class="insights-panel">
      <div class="panel-tab-bar">
        <div class="seg-control">
          <div class="seg-indicator"></div>
          <button class="seg-tab active" data-tab="insights">Insights</button>
          <button class="seg-tab" data-tab="events">Events</button>
          <button class="seg-tab" data-tab="track">Track</button>
        </div>
      </div>

      <!-- Curated race insights -->
      <div class="insights-content" id="race-insights-content"></div>

      <!-- Lap-by-lap events (previously "insights") -->
      <div class="insights-content hidden" id="events-content">
        <div class="insights-empty">Events will appear as the race progresses</div>
      </div>

      <!-- Track info placeholder -->
      <div class="insights-content hidden" id="track-content">
        <div class="insights-empty">Track information coming soon</div>
      </div>
    </aside>

    <!-- BOTTOM: TIMELINE + EVENTS + PLAYER -->
    <div class="timeline-bar">
      <!-- Timeline -->
      <div class="tl-track" id="tl-track">
        <div class="tl-progress" id="tl-progress"></div>
        <div class="tl-hover" id="tl-hover"></div>
        <div class="tl-laps" id="tl-laps"></div>
        <div class="tl-tooltip" id="tl-tooltip">
          <div class="tl-tooltip-time" id="tl-tooltip-time"></div>
          <div class="tl-tooltip-lap" id="tl-tooltip-lap"></div>
        </div>
      </div>
      <!-- Events -->
      <div class="tl-events" id="tl-events"></div>
      <!-- Player controls row -->
      <div class="player-bar" id="player-bar">
        <span class="player-time" id="player-time">0:00:00 / 0:00:00</span>
        <div class="player-center">
          <button class="player-nav-btn" id="btn-prev-lap" title="Previous lap (Shift+Left)">
            <svg viewBox="0 0 16 16" fill="none"><path d="M3.333 2.667a.667.667 0 01.667.667v9.333a.667.667 0 01-1.333 0V3.334a.667.667 0 01.666-.667z" fill="currentColor"/><path d="M11.279 2.89c.877-.585 2.054.042 2.054 1.098v8.024c0 1.056-1.177 1.683-2.054 1.098L5.255 9.1c-.785-.523-.785-1.676 0-2.199l6.024-4.01z" fill="currentColor"/></svg>
          </button>
          <button class="player-play" id="btn-play" title="Play / Pause (Space)">
            <svg class="player-icon-play" viewBox="0 0 20 20" fill="none"><path d="M7.703 1.973C6.178.986 4.167 2.08 4.167 3.897v12.206c0 1.816 2.012 2.91 3.536 1.924l9.432-5.848c1.396-.903 1.396-2.945 0-3.848L7.703 1.973z" fill="currentColor"/></svg>
            <svg class="player-icon-pause hidden" viewBox="0 0 20 20" fill="none"><rect x="3.5" y="2" width="4.5" height="16" rx="1.5" fill="currentColor"/><rect x="12" y="2" width="4.5" height="16" rx="1.5" fill="currentColor"/></svg>
          </button>
          <button class="player-nav-btn" id="btn-next-lap" title="Next lap (Shift+Right)">
            <svg viewBox="0 0 16 16" fill="none"><path d="M2.667 3.989c0-1.056 1.177-1.683 2.054-1.099l6.024 4.011c.785.523.785 1.676 0 2.199l-6.024 4.01c-.877.585-2.054-.041-2.054-1.098V3.989z" fill="currentColor"/><path d="M12.667 2.667a.667.667 0 01.666.667v9.333a.667.667 0 01-1.333 0V3.334a.667.667 0 01.667-.667z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="player-right">
          <div class="speed-control" id="speed-control">
            <button class="player-speed-btn" id="btn-speed" title="Playback speed">1x</button>
            <div class="speed-dropdown hidden" id="speed-dropdown">
              <button class="speed-option active" data-speed="1">1x</button>
              <button class="speed-option" data-speed="2">2x</button>
              <button class="speed-option" data-speed="4">4x</button>
              <button class="speed-option" data-speed="8">8x</button>
              <button class="speed-option" data-speed="16">16x</button>
              <button class="speed-option" data-speed="32">32x</button>
            </div>
          </div>
          <div class="settings-control" id="settings-control">
            <button class="player-icon-btn" id="btn-player-settings" title="Settings">
              <svg viewBox="0 0 16 16" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.62524 2.06908C6.93167 1.60943 7.44753 1.33333 8 1.33333C8.55247 1.33333 9.06833 1.60943 9.37473 2.06908L9.7548 2.63917C9.94707 2.92758 10.2978 3.06685 10.6356 2.98891L11.1044 2.88071C11.6689 2.75045 12.2606 2.92017 12.6702 3.32978C13.0799 3.7394 13.2495 4.33113 13.1193 4.89559L13.0111 5.36443C12.9331 5.70218 13.0724 6.05291 13.3609 6.24519L13.9309 6.62524C14.3906 6.93167 14.6667 7.44753 14.6667 8C14.6667 8.55247 14.3906 9.06833 13.9309 9.37473L13.3609 9.7548C13.0724 9.94707 12.9331 10.2978 13.0111 10.6356L13.1193 11.1044C13.2495 11.6689 13.0799 12.2606 12.6702 12.6702C12.2606 13.0799 11.6689 13.2495 11.1044 13.1193L10.6356 13.0111C10.2978 12.9331 9.94707 13.0724 9.7548 13.3609L9.37473 13.9309C9.06833 14.3906 8.55247 14.6667 8 14.6667C7.44753 14.6667 6.93167 14.3906 6.62524 13.9309L6.24519 13.3609C6.05291 13.0724 5.70218 12.9331 5.36443 13.0111L4.89559 13.1193C4.33113 13.2495 3.7394 13.0799 3.32978 12.6702C2.92017 12.2606 2.75045 11.6689 2.88071 11.1044L2.98891 10.6356C3.06685 10.2978 2.92758 9.94707 2.63917 9.7548L2.06908 9.37473C1.60943 9.06833 1.33333 8.55247 1.33333 8C1.33333 7.44753 1.60943 6.93167 2.06908 6.62524L2.63917 6.24519C2.92758 6.05291 3.06685 5.70218 2.98891 5.36443L2.88071 4.89559C2.75045 4.33114 2.92016 3.7394 3.32978 3.32978C3.7394 2.92016 4.33113 2.75045 4.89559 2.88071L5.36443 2.98891C5.70218 3.06685 6.05291 2.92758 6.24519 2.63917L6.62524 2.06908ZM5.91667 8C5.91667 6.8494 6.8494 5.91667 8 5.91667C9.1506 5.91667 10.0833 6.8494 10.0833 8C10.0833 9.1506 9.1506 10.0833 8 10.0833C6.8494 10.0833 5.91667 9.1506 5.91667 8Z" fill="currentColor"/></svg>
            </button>
            <div class="settings-popup hidden" id="settings-popup">
              <label class="settings-row">
                <span>Show trails</span>
                <input type="checkbox" id="opt-trails" checked />
              </label>
              <label class="settings-row">
                <span>Show labels</span>
                <input type="checkbox" id="opt-labels" checked />
              </label>
            </div>
